{% set name = "cmblensplus" %}
{% set version = "0.1.0" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  path: ..
  
#source:
#  url: https://github.com/toshiyan/cmblensplus/archive/refs/tags/v{{ version }}.tar.gz
#  sha256: ...

build:
  number: 0
  skip: true  # [win]


requirements:
  build:
    - {{ compiler('c') }}
    - {{ compiler('fortran') }}
    - make

  host:
    - python
    - pip
    - setuptools
    - wheel
    - numpy
    - scipy
    - fftw
    - cfitsio
    - libblas
    - liblapack

  run:
    - python
    - numpy
    - scipy
    - fftw
    - cfitsio
    
test:
  imports:
    - cmblensplus