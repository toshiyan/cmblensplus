name: macOS import test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  import-test:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          brew update
          brew install gcc meson ninja

      - name: Install package
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install --no-cache-dir -v .

      - name: Test installed package
        run: |
          cd /tmp
          python - <<'PY'
          import cmblensplus
          print(cmblensplus.__file__)

          import cmblensplus.basic.libbasic
          print("libbasic import OK")

          from cmblensplus.utils import cmb
          print("utils import OK")
          PY