name: macOS import test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  import-test:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          brew update
          brew install gcc meson ninja

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -v .

      - name: Check built extensions
        run: |
          echo "=== libbasic files ==="
          find . -name 'libbasic*' -print

          echo "=== installed cmblensplus files ==="
          python - <<'PY'
          import cmblensplus, pathlib
          root = pathlib.Path(cmblensplus.__file__).parent
          print(root)
          for p in root.rglob("libbasic*"):
              print(p)
          PY    
            
      - name: Import basic extension directly
        run: |
          python - <<'PY'
          import cmblensplus.basic.libbasic
          print("libbasic import OK")
          PY

      - name: Import utils
        run: |
          python - <<'PY'
          from cmblensplus.utils import cmb
          print("OK")
          PY

          