name: macOS import test

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  import-test:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          brew update
          brew install gcc meson ninja

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-cache-dir -v .

      - name: Build and install package
        run: |
          python -m pip install -U pip setuptools wheel
          python -m pip install -v .

      - name: Check import location and libbasic
        run: |
          python -c "import cmblensplus, pathlib; print(cmblensplus.__file__); root = pathlib.Path(cmblensplus.__file__).parent; [print(p) for p in root.rglob('libbasic*')]"

      - name: Import basic extension directly
        run: |
          python - <<'PY'
          import cmblensplus.basic.libbasic
          print("libbasic import OK")
          PY

      - name: Import utils
        run: |
          python - <<'PY'
          from cmblensplus.utils import cmb
          print("OK")
          PY

          